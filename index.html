<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pest Control Inventory - Login</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
  <header class="topbar">
    <h1>Pest Control Inventory</h1>
  </header>

  <main class="page">
    <section class="card">
      <h2>Sign In</h2>
      <p class="subtle">Enter your credentials to access the system.</p>

      <form id="loginForm" class="grid-form">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Enter username" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="primary">Sign In</button>
      </form>

      <p id="loginMessage" class="message" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "manager" && password === "1234") {
        window.location.href = "pages/manager.html";
      } else if (username === "technician" && password === "1234") {
        window.location.href = "pages/technician.html";
      } else {
        loginMessage.textContent = "Invalid username or password.";
      }
    });
  </script>
</body>
</html>
