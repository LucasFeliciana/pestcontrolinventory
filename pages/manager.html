<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pest Control Inventory - Manager</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Manager Inventory Tools</h1>
    <nav class="top-links">
      <a href="index.html">Technician Page</a>
    </nav>
  </header>

  <main class="page">
    <section class="card">
      <h2>Add New Product</h2>
      <form id="productForm" class="grid-form two-columns">
        <div class="field">
          <label for="newProductName">Product Name</label>
          <input id="newProductName" type="text" placeholder="e.g. Bifen IT" required>
        </div>

        <div class="field">
          <label for="newProductUnit">Unit</label>
          <input id="newProductUnit" type="text" placeholder="e.g. Bottle" required>
        </div>

        <div class="field">
          <label for="newProductStock">Starting Stock</label>
          <input id="newProductStock" type="number" min="0" placeholder="e.g. 10" required>
        </div>

        <button type="submit" class="primary">Create Product</button>
      </form>
      <p id="productMessage" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>Manager Stock Actions</h2>
      <form id="managerForm" class="grid-form two-columns">
        <div class="field">
          <label for="managerName">Manager Name</label>
          <input id="managerName" type="text" value="Manager" required>
        </div>

        <div class="field">
          <label for="managerProduct">Product</label>
          <select id="managerProduct" required></select>
        </div>

        <div class="field">
          <label for="actionType">Action</label>
          <select id="actionType" required>
            <option value="in">Add Stock (+)</option>
            <option value="adjust">Adjust to Exact Value</option>
          </select>
        </div>

        <div class="field">
          <label for="managerQty">Quantity</label>
          <input id="managerQty" type="number" min="0" placeholder="Add or exact value" required>
        </div>

        <div class="field span-2">
          <label for="managerNote">Note</label>
          <input id="managerNote" type="text" placeholder="e.g. Shipment received">
        </div>

        <button type="submit" class="primary">Save Action</button>
      </form>
      <p id="managerMessage" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>Inventory List</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Unit</th>
              <th>In Stock</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Transaction History</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Product</th>
              <th>Qty</th>
              <th>User</th>
              <th>Note</th>
              <th>Balance</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../scripts/manager.js"></script>
</body>
</html>
